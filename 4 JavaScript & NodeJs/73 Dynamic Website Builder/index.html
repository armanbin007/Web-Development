<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .card{
            display: flex;
            margin: 5px;
            border: 2px solid black;
            width: 900px;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }
        img .img{
            width: 200px;
        }
        .img{
            position: relative;
        }
        .text{
            width: 718px;
        }
        .text h2, p{
            padding: 2px 0;
            margin: 5px;
        }
        .img .capsule {
            position: absolute;
            bottom: 4px;
            z-index: 10;
            right: 5px;
            background: #242020;
            opacity: 0.9;
            color: white;
            padding: 3px;
            border-radius: 3px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="img">
                <img src="source.png">
                <div class="capsule">
                    36:00
                </div>
            </div>
            <div class="text">
                <h2>JavaScript Exercise 13 - Solution & Shoutouts | Sigma Web Development Course - Tutorial #77</h2>
                <p>CodeWithHaryy . 165K views . 2 months ago</p>
            </div>
        </div>
        <script src="script.js"></script>
    </div>
</body>
</html>
